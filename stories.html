<!DOCTYPE html>
<!--
  File: stories.html
  Mô tả: Trang danh sách truyện cá nhân
  👉 Đặt file này cùng cấp với index.html trong project
-->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truyện Của Tôi · 云书阁</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #060e14;
      --bg-card:   #0f2030;
      --bg-card2:  #152840;
      --accent:    #4ecdc4;
      --accent2:   #5ba8d4;
      --text:      #d4ecf0;
      --text-sub:  #6fa8b8;
      --text-muted:#324f5e;
      --border:    rgba(78,205,196,0.14);
      --border-hi: rgba(78,205,196,0.38);
      --glow:      0 0 24px rgba(78,205,196,0.15);
      --shadow:    0 8px 32px rgba(0,0,0,0.6);
      --radius:    14px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Animated gradient background ── */
    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(78,205,196,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 85% 85%, rgba(91,168,212,0.07) 0%, transparent 60%);
      animation: bgPulse 12s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem;
    }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
    }
    .page-title {
      font-family: 'Noto Serif SC'; font-size: 24px;
      color: var(--accent); letter-spacing: 2px;
    }
    .page-title span { font-size: 14px; color: var(--text-sub); font-family: 'Noto Sans SC'; margin-left: 10px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--border-hi); background: none;
      color: var(--accent); font-size: 12px; cursor: pointer;
      font-family: 'Noto Sans SC'; text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(78,205,196,0.1); }

    /* ── User info bar ── */
    #userBar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(15,32,48,0.8); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }
    #userAvatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border-hi); object-fit: cover; }
    #userName   { font-size: 14px; flex: 1; }
    #logoutBtn  {
      padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
      background: none; color: var(--text-sub); font-size: 12px;
      cursor: pointer; font-family: 'Noto Sans SC'; transition: all 0.2s;
    }
    #logoutBtn:hover { border-color: #e06c75; color: #e06c75; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .btn-primary {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff; font-weight: 700; font-size: 13px;
      cursor: pointer; font-family: 'Noto Sans SC';
      box-shadow: 0 4px 14px rgba(78,205,196,0.3); transition: all 0.25s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(78,205,196,0.4); }
    .search-input {
      flex: 1; min-width: 180px;
      background: rgba(15,32,48,0.8); border: 1px solid var(--border);
      border-radius: 20px; padding: 9px 16px;
      color: var(--text); font-size: 13px; font-family: 'Noto Sans SC';
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--border-hi); }
    .search-input::placeholder { color: var(--text-muted); }

    /* ── Story grid ── */
    #storiesGrid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.1rem;
    }

    /* ── Story card ── */
    .story-card {
      background: rgba(15,32,48,0.85); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.3rem;
      cursor: pointer; transition: all 0.28s;
      position: relative; overflow: hidden;
      animation: fadeUp 0.35s ease both;
      backdrop-filter: blur(10px);
      text-decoration: none; display: block; color: inherit;
    }
    .story-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent); opacity: 0.8;
    }
    .story-card:hover {
      border-color: var(--border-hi); transform: translateY(-3px);
      box-shadow: var(--shadow), var(--glow);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .story-emoji { font-size: 28px; margin-bottom: 10px; }
    .story-title {
      font-family: 'Noto Serif SC'; font-size: 15px; font-weight: 500;
      margin-bottom: 6px; line-height: 1.4;
    }
    .story-preview {
      font-size: 12px; color: var(--text-sub); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 10px;
    }
    .story-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; color: var(--text-muted);
    }
    .story-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
    }
    .story-card:hover .story-actions { opacity: 1; }
    .story-act-btn {
      width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
      background: rgba(15,32,48,0.9); color: var(--text-sub);
      font-size: 12px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s;
    }
    .story-act-btn:hover { border-color: var(--border-hi); color: var(--accent); }
    .story-act-btn.del:hover { border-color: #e06c75; color: #e06c75; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 4rem 2rem; color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty-text  { font-size: 14px; line-height: 1.8; }

    /* ── Loading ── */
    .loading {
      text-align: center; padding: 3rem; color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .loading::after {
      content: ''; display: inline-block;
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border-hi); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite; margin-left: 10px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login required ── */
    #loginRequired {
      display: none; text-align: center; padding: 4rem 2rem;
    }
    #loginRequired .msg { font-size: 16px; color: var(--text-sub); margin-bottom: 1.5rem; }

    /* ── Write Modal ── */
    #writeModal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(2,8,14,0.9); backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem; opacity: 0; transition: opacity 0.3s;
    }
    #writeModal.open    { display: flex; }
    #writeModal.visible { opacity: 1; }
    .write-panel {
      background: #0b1a24; border: 1px solid var(--border-hi);
      border-radius: 20px; width: 100%; max-width: 720px;
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: var(--shadow); transform: scale(0.93); transition: transform 0.3s;
      overflow: hidden;
    }
    #writeModal.visible .write-panel { transform: scale(1); }
    .write-header {
      display: flex; align-items: center; padding: 1.2rem 1.6rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(78,205,196,0.055) 0%, transparent 60%);
    }
    .write-header h2 { font-family: 'Noto Serif SC'; font-size: 18px; flex: 1; }
    .write-body { flex: 1; overflow-y: auto; padding: 1.4rem 1.6rem; display: flex; flex-direction: column; gap: 14px; }
    .wf-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .wf-input, .wf-textarea {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-size: 13px; font-family: 'Noto Sans SC'; outline: none; transition: border-color 0.2s;
    }
    .wf-input:focus, .wf-textarea:focus { border-color: var(--border-hi); }
    .wf-textarea { resize: vertical; min-height: 200px; line-height: 1.7; font-family: 'Noto Serif SC'; }
    .wf-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .write-footer {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 1rem 1.6rem; border-top: 1px solid var(--border);
    }
    .btn-cancel {
      padding: 9px 20px; border-radius: 20px; border: 1px solid var(--border);
      background: none; color: var(--text-sub); font-size: 12px;
      cursor: pointer; font-family: 'Noto Sans SC'; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text-sub); color: var(--text); }
    .btn-save {
      padding: 9px 24px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff; font-weight: 700; font-size: 12px;
      cursor: pointer; font-family: 'Noto Sans SC';
      box-shadow: 0 4px 14px rgba(78,205,196,0.25); transition: all 0.25s;
    }
    .btn-save:hover { transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
      background: var(--bg-card2); border: 1px solid var(--border-hi);
      border-radius: 10px; padding: 11px 18px; font-size: 12px; color: var(--text);
      box-shadow: var(--shadow); transform: translateY(20px); opacity: 0;
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      .page-title { font-size: 18px; }
      #storiesGrid { grid-template-columns: 1fr; }
      .write-panel { max-height: 96vh; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="page-header">
    <div class="page-title">
      ✍️ Truyện Của Tôi
      <span id="storyCount"></span>
    </div>
    <a href="index.html" class="back-btn">← Về trang chủ</a>
  </div>

  <!-- User bar (hiện khi đã đăng nhập) -->
  <div id="userBar" style="display:none">
    <img id="userAvatar" src="" alt="">
    <span id="userName"></span>
    <button id="logoutBtn" onclick="handleLogout()">Đăng xuất</button>
  </div>

  <!-- Login required (hiện khi chưa đăng nhập) -->
  <div id="loginRequired">
    <div class="msg">Vui lòng đăng nhập để xem và viết truyện của bạn.</div>
    <a href="index.html" class="back-btn">← Về trang chủ để đăng nhập</a>
  </div>

  <!-- Action bar -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="btn-primary" onclick="openWriteModal()">
      ✨ Viết truyện mới
    </button>
    <input type="text" class="search-input" id="searchInput"
           placeholder="🔍 Tìm kiếm truyện..."
           oninput="filterStories(this.value)">
  </div>

  <!-- Stories grid -->
  <div id="storiesGrid">
    <div class="loading">Đang tải truyện</div>
  </div>

</div><!-- /.container -->

<!-- Write modal -->
<div id="writeModal" onclick="if(event.target===this)closeWriteModal()">
  <div class="write-panel">
    <div class="write-header">
      <h2 id="modalTitle">✍️ Viết truyện mới</h2>
      <button class="btn-cancel" onclick="closeWriteModal()">✕</button>
    </div>
    <div class="write-body">
      <div>
        <div class="wf-label">Tiêu đề truyện *</div>
        <input class="wf-input" id="wfTitle" placeholder="Nhập tiêu đề...">
      </div>
      <div style="flex:1">
        <div class="wf-label">Nội dung</div>
        <textarea class="wf-textarea" id="wfContent"
          placeholder="Viết nội dung truyện của bạn ở đây...&#10;&#10;Mỗi đoạn văn cách nhau bằng một dòng trống.&#10;Độc giả có thể comment vào từng đoạn."></textarea>
        <div class="wf-hint">
          💡 Xuống dòng 2 lần (Enter Enter) để tách đoạn — mỗi đoạn có thể nhận comment riêng
        </div>
      </div>
    </div>
    <div class="write-footer">
      <button class="btn-cancel" onclick="closeWriteModal()">Hủy</button>
      <button class="btn-save" id="saveBtn" onclick="saveStory()">💾 Lưu truyện</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/modules/stories.js"></script>
</body>
</html>
